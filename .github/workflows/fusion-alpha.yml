name: MLX-RFSN Fusion Alpha

on:
  push:
    branches: [main, mlx-rfsn-fusion-cleanup, mlx-rfsn-fusion-alpha-8]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m compileall -q rfsn_v10 rfsn_v11 tests benchmarks scripts memory

  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: |
          PYTHONPATH=. RFSN_BACKEND=numpy RFSN_TELEMETRY_HMAC_KEY=test-secret \
            pytest -q tests -m "not mlx and not slow and not benchmark and not experimental and not integration and not db"

  v11-collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: |
          PYTHONPATH=. pytest -q rfsn_v11/tests

  candidate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: |
          PYTHONPATH=. pytest -q \
            tests/benchmarks/test_candidate_result_schema.py \
            tests/benchmarks/test_candidate_registry.py \
            tests/benchmarks/test_memory_metrics.py \
            tests/benchmarks/test_logit_metrics.py \
            tests/benchmarks/test_rfsn_v11_cache_injection_contract.py

  benchmark-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: |
          PYTHONPATH=. python benchmarks/kv_shootout.py --quick
      - run: |
          cat artifacts/bench/shootout/quick/results.md || true

  apple-silicon-benchmark:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[fusion]"
      - name: Run strict benchmark with direct-packed candidate
        run: |
          PYTHONPATH=. python benchmarks/kv_shootout.py \
            --quick \
            --require-model \
            --strict \
            --include-legacy
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-silicon-benchmark-results
          path: artifacts/bench/shootout/quick/
          retention-days: 7

  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: |
          latest_wh=$(ls -t dist/*.whl | head -1)
          python -m pip install --force-reinstall "$latest_wh"
      - run: python -c "import rfsn_v10, rfsn_v11; print('ok')"
