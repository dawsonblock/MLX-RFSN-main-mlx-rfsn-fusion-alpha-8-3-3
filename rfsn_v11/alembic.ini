# alembic.ini — Alembic configuration for rfsn_v11 telemetry schema.
#
# Override the database URL at runtime by setting the environment variable:
#   RFSN_DB_URL=postgresql://user:pass@host/dbname alembic upgrade head
#
# The env.py reads RFSN_DB_URL and falls back to sqlalchemy.url below.

[alembic]
# Path to the alembic migration environment (relative to this file's location).
script_location = rfsn_v11/alembic

# Default database URL — SQLite file alongside the package root.
# Override via the RFSN_DB_URL environment variable.
sqlalchemy.url = sqlite:///rfsn_v11_telemetry.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
