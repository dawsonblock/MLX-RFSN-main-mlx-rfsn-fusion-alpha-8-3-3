[project]
name = "mlx-turboquant"
version = "0.1.0"
description = "TurboQuant KV cache compression for MLX"
requires-python = ">=3.10"
dependencies = [
    "mlx>=0.22.0",
    "mlx-lm>=0.22.0",
    "numpy>=1.24.0",
]

[dependency-groups]
dev = [
    "scipy>=1.10.0",
    "pytest>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mlx_turboquant"]
